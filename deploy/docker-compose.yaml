services:
  deploy:
    build:
      context: .
    entrypoint: /bootstrap-docker.sh
    environment:
      # Required: a GitHub release git tag, e.g. v1-0-rc1
      - DATA_BROWSER_VERSION
      # gsutil bundled with newer gcloud SDK ships Python 3.14;
      # gsutil only supports 3.8-3.12. Force use of Debian system python3.
      - CLOUDSDK_PYTHON=/usr/bin/python3
      - CLOUDSDK_GSUTIL_PYTHON=/usr/bin/python3
    volumes:
      - gradle-cache:/.gradle
      - data-browser:/home/circleci/data-browser
      - ./bootstrap-docker.sh:/bootstrap-docker.sh

volumes:
  data-browser:
  gradle-cache: